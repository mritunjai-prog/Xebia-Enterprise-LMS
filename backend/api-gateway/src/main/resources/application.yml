server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      httpclient:
        pool:
          max-connections: 500
      default-filters:
        - AddResponseHeader=X-Gateway, enterprise-lms
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: false
            maxAge: 3600

lms:
  jwt:
    issuer: ${JWT_ISSUER:enterprise-lms}
    secret: ${JWT_SECRET:replace-with-at-least-32-characters}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
