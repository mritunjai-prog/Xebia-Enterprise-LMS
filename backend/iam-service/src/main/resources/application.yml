server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: iam-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lms}
    username: ${DB_USERNAME:lms}
    password: ${DB_PASSWORD:lms}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: iam
  flyway:
    schemas: iam
    default-schema: iam
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

lms:
  jwt:
    issuer: ${JWT_ISSUER:enterprise-lms}
    secret: ${JWT_SECRET:replace-with-at-least-32-characters}
  seed:
    admin-password: ${ADMIN_PASSWORD:AdminChangeMe123!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
