services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build: ./api-gateway
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-replace-with-at-least-32-characters}
      REDIS_HOST: redis
      SERVICES_COURSE: http://course-service:8084
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  course-service:
    build: ./course-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/lms
      DB_USERNAME: lms
      DB_PASSWORD: lms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-replace-with-at-least-32-characters}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
