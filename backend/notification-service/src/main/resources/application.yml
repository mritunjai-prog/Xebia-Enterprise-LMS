server.port: ${SERVER_PORT:8087}
spring:
  application.name: notification-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lms}
    username: ${DB_USERNAME:lms}
    password: ${DB_PASSWORD:lms}
  jpa:
    hibernate.ddl-auto: validate
    properties.hibernate.default_schema: notification
  flyway:
    schemas: notification
    default-schema: notification
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.xebia.lms.common.event,java.util,java.time
management.endpoints.web.exposure.include: health,info,metrics
