server.port: ${SERVER_PORT:8092}
spring:
  application.name: audit-reporting-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lms}
    username: ${DB_USERNAME:lms}
    password: ${DB_PASSWORD:lms}
  jpa:
    hibernate.ddl-auto: validate
    properties.hibernate.default_schema: audit_reporting
  flyway:
    schemas: audit_reporting
    default-schema: audit_reporting
management.endpoints.web.exposure.include: health,info,metrics
